<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Background Remover</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #fff;
      padding: 2rem;
    }
    
    .container {
      max-width: 800px;
      margin: 0 auto;
      text-align: center;
    }
    
    h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      background: linear-gradient(90deg, #00d2ff, #3a7bd5);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .subtitle {
      color: #888;
      margin-bottom: 2rem;
    }
    
    .upload-area {
      border: 2px dashed #3a7bd5;
      border-radius: 16px;
      padding: 3rem;
      cursor: pointer;
      transition: all 0.3s ease;
      background: rgba(255,255,255,0.05);
    }
    
    .upload-area:hover {
      border-color: #00d2ff;
      background: rgba(255,255,255,0.1);
    }
    
    .upload-area.dragover {
      border-color: #00d2ff;
      transform: scale(1.02);
    }
    
    .upload-icon {
      font-size: 4rem;
      margin-bottom: 1rem;
    }
    
    .upload-text {
      font-size: 1.2rem;
      color: #aaa;
    }
    
    .upload-hint {
      font-size: 0.9rem;
      color: #666;
      margin-top: 0.5rem;
    }
    
    #fileInput {
      display: none;
    }
    
    .preview-section {
      margin-top: 2rem;
      display: none;
    }
    
    .preview-section.active {
      display: block;
    }
    
    .preview-container {
      display: flex;
      gap: 2rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 1rem;
    }
    
    .preview-box {
      flex: 1;
      min-width: 280px;
      max-width: 350px;
    }
    
    .preview-box h3 {
      margin-bottom: 0.5rem;
      color: #888;
      font-size: 0.9rem;
      text-transform: uppercase;
    }
    
    .preview-image {
      width: 100%;
      border-radius: 12px;
      background: #fff;
      min-height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .preview-image img {
      max-width: 100%;
      border-radius: 12px;
    }
    
    .preview-image.checkerboard {
      background-image: 
        linear-gradient(45deg, #ccc 25%, transparent 25%),
        linear-gradient(-45deg, #ccc 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #ccc 75%),
        linear-gradient(-45deg, transparent 75%, #ccc 75%);
      background-size: 20px 20px;
      background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
    }
    
    .loading {
      display: none;
      margin-top: 2rem;
    }
    
    .loading.active {
      display: block;
    }
    
    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(255,255,255,0.1);
      border-top-color: #00d2ff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 1rem;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .download-btn {
      display: none;
      margin-top: 1.5rem;
      padding: 1rem 2rem;
      font-size: 1.1rem;
      background: linear-gradient(90deg, #00d2ff, #3a7bd5);
      border: none;
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      transition: transform 0.2s;
    }
    
    .download-btn.active {
      display: inline-block;
    }
    
    .download-btn:hover {
      transform: scale(1.05);
    }
    
    .credits {
      margin-top: 2rem;
      color: #666;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🖼️ Image Background Remover</h1>
    <p class="subtitle">Remove background from images instantly</p>
    
    <div class="upload-area" id="uploadArea">
      <div class="upload-icon">📁</div>
      <div class="upload-text">Click or drag image here</div>
      <div class="upload-hint">Supports JPG, PNG, WebP</div>
    </div>
    <input type="file" id="fileInput" accept="image/*">
    
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p>Processing... Please wait</p>
    </div>
    
    <div class="preview-section" id="previewSection">
      <div class="preview-container">
        <div class="preview-box">
          <h3>Original</h3>
          <div class="preview-image">
            <img id="originalPreview" src="" alt="Original">
          </div>
        </div>
        <div class="preview-box">
          <h3>Result</h3>
          <div class="preview-image checkerboard">
            <img id="resultPreview" src="" alt="Result">
          </div>
        </div>
      </div>
      <button class="download-btn" id="downloadBtn">⬇️ Download</button>
    </div>
    
    <p class="credits">Powered by Remove.bg API</p>
  </div>

  <script>
    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');
    const loading = document.getElementById('loading');
    const previewSection = document.getElementById('previewSection');
    const originalPreview = document.getElementById('originalPreview');
    const resultPreview = document.getElementById('resultPreview');
    const downloadBtn = document.getElementById('downloadBtn');

    let currentResultData = null;

    // Click to upload
    uploadArea.addEventListener('click', () => fileInput.click());

    // Drag and drop
    uploadArea.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadArea.classList.add('dragover');
    });

    uploadArea.addEventListener('dragleave', () => {
      uploadArea.classList.remove('dragover');
    });

    uploadArea.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadArea.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (file) processFile(file);
    });

    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) processFile(file);
    });

    async function processFile(file) {
      if (!file.type.startsWith('image/')) {
        alert('Please select an image file');
        return;
      }

      // Show original preview
      const reader = new FileReader();
      reader.onload = (e) => {
        originalPreview.src = e.target.result;
      };
      reader.readAsDataURL(file);

      // Show loading
      loading.classList.add('active');
      previewSection.classList.remove('active');

      try {
        // Convert to base64
        const base64 = await fileToBase64(file);
        const base64Data = base64.split(',')[1];

        // Call API
        const response = await fetch('/api/remove-bg', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ image: base64Data })
        });

        if (!response.ok) {
          const err = await response.json();
          throw new Error(err.error || 'Processing failed');
        }

        const result = await response.json();
        
        // Show result
        resultPreview.src = result.image;
        currentResultData = result.image;
        downloadBtn.classList.add('active');
        previewSection.classList.add('active');
      } catch (error) {
        alert('Error: ' + error.message);
      } finally {
        loading.classList.remove('active');
      }
    }

    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    // Download
    downloadBtn.addEventListener('click', () => {
      if (!currentResultData) return;
      
      const link = document.createElement('a');
      link.href = currentResultData;
      link.download = 'removed-bg.png';
      link.click();
    });
  </script>
</body>
</html>
